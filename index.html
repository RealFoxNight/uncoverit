<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>uncoverit — Angel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      content: [],
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          animation: {
            'snow-fall': 'snowFall 18s linear infinite',
            'snow-fall-slow': 'snowFall 32s linear infinite',
            'blink': 'blink 0.8s step-end infinite',
            'fadeQuotes': 'fadeQuotes 24s infinite',
            'typing': 'typing 3.5s steps(40, end) forwards',
            'cursor': 'blink 0.8s step-end infinite',
          },
          keyframes: {
            snowFall: {
              '0%': { transform: 'translateY(-120vh) translateX(-30vw)' },
              '100%': { transform: 'translateY(120vh) translateX(80vw)' },
            },
            blink: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0' },
            },
            fadeQuotes: {
              '0%, 20%': { opacity: '0' },
              '25%, 45%': { opacity: '1' },
              '50%, 70%': { opacity: '0' },
              '75%, 95%': { opacity: '1' },
              '100%': { opacity: '0' },
            },
            typing: {
              'from': { width: '0' },
              'to': { width: '100%' }
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* Checkered / Grid Background */
    .grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(120, 80, 220, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 80, 220, 0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.6;
    }

    /* Snowflakes */
    .snowflake {
      position: fixed;
      top: -10vh;
      width: 5px; height: 5px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 8px #fff, 0 0 12px #a78bfa;
      pointer-events: none;
      z-index: 9999;
      animation: snow-fall linear infinite;
      opacity: 0.75;
    }
    .snowflake:nth-child(odd) { width:4px; height:4px; opacity:0.6; animation-duration:22s; }
    .snowflake:nth-child(3n) { width:7px; height:7px; opacity:0.9; animation-duration:15s; }
    .snowflake-slow { width:3px; height:3px; opacity:0.5; animation-duration:35s !important; }

    /* Glassmorphism */
    .glass-card {
      background: rgba(20, 20, 35, 0.45);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 24px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .glass-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 40px 100px rgba(139, 92, 246, 0.3), inset 0 2px 0 rgba(255,255,255,0.15);
      border-color: rgba(167, 139, 250, 0.4);
    }

    /* Terminal / Monitor */
    .terminal {
      background: #0c0c0c;
      border: 8px solid #1f1f1f;
      border-top: 35px solid #1f1f1f;
      border-radius: 12px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.9),
                  inset 0 0 60px rgba(167, 139, 250, 0.15);
      position: relative;
    }
    .terminal::before {
      content: '';
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 6px;
      background: #333;
      border-radius: 3px;
    }
    .code-line {
      opacity: 0;
      animation: fadeInCode 0.4s forwards;
    }
    @keyframes fadeInCode {
      to { opacity: 1; }
    }
  </style>
</head>
<body class="relative">

  <!-- Grid Background -->
  <div class="grid-bg"></div>

  <!-- Scroll Progress -->
  <div id="progress" class="fixed top-0 left-0 right-0 h-1 bg-gradient-to-r from-violet-400 to-fuchsia-500 z-[10000]"></div>

  <!-- Snowflakes -->
  <div class="snowflake" style="left:5%; animation-duration:14s; animation-delay:-2s;"></div>
  <div class="snowflake" style="left:12%; animation-duration:19s; animation-delay:-5s;"></div>
  <div class="snowflake" style="left:18%; animation-duration:16s; animation-delay:-1s;"></div>
  <div class="snowflake" style="left:25%; animation-duration:21s; animation-delay:-8s;"></div>
  <div class="snowflake" style="left:33%; animation-duration:17s; animation-delay:-4s;"></div>
  <div class="snowflake" style="left:38%; animation-duration:23s; animation-delay:-10s;"></div>
  <div class="snowflake" style="left:45%; animation-duration:15s; animation-delay:-3s;"></div>
  <div class="snowflake" style="left:52%; animation-duration:20s; animation-delay:-7s;"></div>
  <div class="snowflake" style="left:60%; animation-duration:18s; animation-delay:-6s;"></div>
  <div class="snowflake" style="left:67%; animation-duration:22s; animation-delay:-9s;"></div>
  <div class="snowflake" style="left:74%; animation-duration:13s; animation-delay:-12s;"></div>
  <div class="snowflake" style="left:82%; animation-duration:19s; animation-delay:0s;"></div>
  <div class="snowflake-slow" style="left:9%; animation-delay:-15s;"></div>
  <div class="snowflake-slow" style="left:20%; animation-delay:-22s;"></div>
  <div class="snowflake-slow" style="left:35%; animation-delay:-18s;"></div>
  <div class="snowflake-slow" style="left:48%; animation-delay:-25s;"></div>
  <div class="snowflake-slow" style="left:57%; animation-delay:-10s;"></div>
  <div class="snowflake-slow" style="left:70%; animation-delay:-20s;"></div>
  <div class="snowflake-slow" style="left:85%; animation-delay:-14s;"></div>
  <div class="snowflake-slow" style="left:92%; animation-delay:-28s;"></div>

  <div class="max-w-4xl w-full mx-auto space-y-16 py-12 px-6 relative z-10">

    <!-- Hero Card -->
    <div class="glass-card p-10 md:p-16 text-center">
      <div class="profile-wrapper mb-10 mx-auto w-52 h-52">
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&amp;h=400&amp;fit=crop&amp;crop=faces" 
             alt="Angel" 
             class="profile-img w-full h-full rounded-2xl object-cover shadow-2xl ring-4 ring-violet-500/30">
      </div>
      
      <p id="greeting" class="text-2xl text-white/70 mb-3"></p>
      <h1 class="text-7xl md:text-8xl font-bold tracking-tighter mb-4">
        <span id="typing" class="inline-block"></span>
      </h1>
      <p class="text-3xl text-violet-300 font-light">uncoverit</p>
      
      <p class="mt-10 text-xl md:text-2xl text-white/70 max-w-xl mx-auto leading-relaxed">
        Editor • Programmer • Security Specialist • Graphics Designer
      </p>
    </div>

    <!-- Connect -->
    <div class="glass-card p-12">
      <h2 class="text-5xl font-semibold mb-10 text-center text-white">Connect</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <a href="https://discord.com/users/.angel.femboy" target="_blank" 
           class="glass-card p-8 text-center hover:scale-105 transition-all group">
          <div class="text-6xl mb-4">💬</div>
          <div class="font-semibold text-xl">Discord</div>
          <div class="text-violet-300 mt-1">.angel.femboy</div>
        </a>
        <a href="https://t.me/lightexeyt" target="_blank" 
           class="glass-card p-8 text-center hover:scale-105 transition-all group">
          <div class="text-6xl mb-4">✈️</div>
          <div class="font-semibold text-xl">Telegram</div>
          <div class="text-violet-300 mt-1">@lightexeyt</div>
        </a>
        <a href="https://github.com/RealFoxNight" target="_blank" 
           class="glass-card p-8 text-center hover:scale-105 transition-all group">
          <div class="text-6xl mb-4">🐙</div>
          <div class="font-semibold text-xl">GitHub</div>
          <div class="text-violet-300 mt-1">RealFoxNight</div>
        </a>
      </div>
    </div>

    <!-- Terminal / Coding Monitor -->
    <div class="glass-card p-8">
      <h2 class="text-4xl font-semibold mb-8 text-center">Live Terminal</h2>
      <div class="terminal mx-auto max-w-3xl p-6 font-mono text-sm text-emerald-400 overflow-hidden">
        <div class="flex items-center gap-2 mb-4 text-white/60 text-xs">
          <div class="w-3 h-3 rounded-full bg-red-500"></div>
          <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
          <div class="w-3 h-3 rounded-full bg-green-500"></div>
          <span class="ml-auto">angel@uncoverit:~/projects</span>
        </div>
        
        <div id="terminal-output" class="space-y-1 text-left min-h-[260px] text-violet-200"></div>
        
        <div class="flex mt-4">
          <span class="text-violet-400">$ </span>
          <span id="typing-command" class="ml-2 text-white"></span>
          <span class="animate-pulse">█</span>
        </div>
      </div>
    </div>

    <p class="text-center text-white/40 text-sm">
      © uncoverit • <span id="year"></span>
    </p>
  </div>

  <script>
    // Greeting
    const hour = new Date().getHours();
    const greetingEl = document.getElementById('greeting');
    if (hour < 12) greetingEl.textContent = "صبح بخیر";
    else if (hour < 18) greetingEl.textContent = "عصر بخیر،";
    else greetingEl.textContent = "شب بخیر،";

    // Typing Name
    const typingEl = document.getElementById('typing');
    const nameText = "Angel";
    let i = 0;
    function typeName() {
      if (i < nameText.length) {
        typingEl.textContent += nameText.charAt(i);
        i++;
        setTimeout(typeName, 110);
      }
    }
    setTimeout(typeName, 600);

    // Terminal Coding Animation
    const commands = [
      "git pull origin main",
      "npm install tailwindcss",
      "echo 'Security audit started...'",
      "nmap -sV uncoverit.dev",
      "blender --render",
      "echo 'Compiling shaders...'",
      "python3 exploit.py --target localhost",
      "whoami && pwd"
    ];
    
    const outputLines = [
      "Cloning into 'hyprland-config'...",
      "✅ Dependencies installed",
      "[+] Port 443 open - HTTPS",
      "Rendering frame 248/720...",
      "Vulnerability found: CVE-2025-xxx",
      "Build successful in 1.8s",
      "root@uncoverit"
    ];

    let lineIndex = 0;
    const terminalOutput = document.getElementById('terminal-output');

    function addLine(text, delay = 400) {
      setTimeout(() => {
        const line = document.createElement('div');
        line.className = 'code-line';
        line.textContent = text;
        terminalOutput.appendChild(line);
        terminalOutput.scrollTop = terminalOutput.scrollHeight;
      }, delay);
    }

    function startTerminal() {
      terminalOutput.innerHTML = '';
      lineIndex = 0;
      
      addLine("$ whoami", 100);
      addLine("angel", 800);
      
      setTimeout(() => {
        commands.forEach((cmd, idx) => {
          setTimeout(() => {
            addLine(`$ ${cmd}`);
            if (idx < outputLines.length) {
              setTimeout(() => addLine(outputLines[idx], 600), 900);
            }
          }, idx * 1400);
        });
      }, 1200);
    }

    // Start terminal animation
    setTimeout(startTerminal, 1800);
    setInterval(() => {
      if (Math.random() > 0.6) startTerminal();
    }, 16000);

    // Year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Scroll Progress
    window.addEventListener('scroll', () => {
      const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const scrolled = (winScroll / height) * 100;
      document.getElementById('progress').style.transform = `scaleX(${scrolled / 100})`;
    });

    // Mouse tilt on profile
    const profileWrapper = document.querySelector('.profile-wrapper');
    document.addEventListener('mousemove', (e) => {
      if (!profileWrapper) return;
      const x = (window.innerWidth / 2 - e.clientX) / 35;
      const y = (window.innerHeight / 2 - e.clientY) / 35;
      profileWrapper.style.transform = `perspective(1000px) rotateX(${y}deg) rotateY(${x}deg)`;
    });
  </script>
</body>
</html>
